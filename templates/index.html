<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Certificação</title>

</head>

<body class="corpo-login">


    <div class="container-login">

        <img src="{{ url_for('static', filename='logo.png') }}" id="logo" alt="Logo SESI">

        

        <form id="meuFormularioLogin">

            

            <div class="mb-3 text-start">

                <label for="exampleInputEmail1" class="form-label label-customizada">E-mail</label>

                <input type="text" class="form-control input-customizado" id="exampleInputEmail1" name="usuario" placeholder="Digite seu e-mail ou usuário" required>

            </div>

            

            <div class="mb-3 text-start">

                <label for="exampleInputPassword1" class="form-label label-customizada">Senha</label>

                <input type="password" class="form-control input-customizado" id="exampleInputPassword1" name="senha" placeholder="Digite sua senha" required>

            </div>

            

            <div class="mb-4 form-check text-start">

                <input type="checkbox" class="form-check-input" id="exampleCheck1">

                <label class="form-check-label texto-check" for="exampleCheck1">Lembrar de mim</label>

            </div>

            

            <button type="submit" class="btn btn-primary botao-entrar" id="Botão">Entrar</button>

            

        </form>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


    <script>

        document.getElementById('meuFormularioLogin').addEventListener('submit', function(event) {

            // Impede o formulário de recarregar a página antes de validar

            event.preventDefault();


            // Pega o que foi digitado e joga para maiúsculo (evita erro caso digitem minúsculo)

            const usuarioDigitado = document.getElementById('exampleInputEmail1').value.trim().toUpperCase();

            const senhaDigitada = document.getElementById('exampleInputPassword1').value.trim().toUpperCase();


            // SE FOR ADMIN: Vai direto para a rota de admin

            if (usuarioDigitado === 'ADMIN' && senhaDigitada === 'ADMIN') {

                window.location.href = "http://10.154.20.99:5000/home-admin";

            } 

            // SE FOR USUARIO: Vai direto para a rota comum

            else if (usuarioDigitado === 'USUARIO' && senhaDigitada === 'USUARIO') {

                window.location.href = "http://10.154.20.99:5000/home";

            } 

            // SE ERRAR OS DOIS: Mostra mensagem de erro

            else {

                alert("Usuário ou Senha inválidos!");

            }

        });

    </script>

</body>

</html>
