<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/styles-4.css">
<title>Cadastro de Ferramentas</title>
</head>

<body>

<div class="container">

    <h1>Cadastro de Ferramenta</h1>

    <form action="https://www.google.com">

        <label>Nome da Ferramenta</label>

        <input type="text" placeholder="Digite o nome da ferramenta">

        <label>Quantidade</label>

        <input type="number" placeholder="Digite a quantidade">

        <label>Descrição</label>

        <textarea placeholder="Descreva a ferramenta..."></textarea>

        <label>Enviar Imagem da Ferramenta</label>

        <input type="file">

        <button class="botao" type="submit">
            Concluído
        </button>

    </form>

</div>

</body>
</html>
